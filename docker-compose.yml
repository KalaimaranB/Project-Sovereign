services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    networks:
      - sovereign-net
    environment:
      POSTGRES_USER: dwc_admin
      POSTGRES_PASSWORD: insecure_dev_password
      POSTGRES_DB: gamespy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    networks:
      - sovereign-net
    ports:
      - "6379:6379"

  sovereign_nas:
    build: .
    image: sovereign-backend:latest
    container_name: sovereign_nas
    restart: always
    networks:
      - sovereign-net
    environment:
      - DATABASE_URL=postgresql://dwc_admin:insecure_dev_password@postgres:5432/gamespy
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "9000:9000"
      - "80:9000"
    depends_on:
      - postgres
    volumes:
      - ./:/app
      - sovereign_logs:/app/logs

  sovereign_qr:
    image: sovereign-backend:latest
    container_name: sovereign_qr
    restart: always
    networks:
      - sovereign-net
    environment:
      - DATABASE_URL=postgresql://dwc_admin:insecure_dev_password@postgres:5432/gamespy
      - REDIS_URL=redis://redis:6379/0
      - TRUST_ALL_PROXIES=1
    depends_on:
      - postgres
    volumes:
      - ./:/app
      - sovereign_logs:/app/logs

  sovereign_profile:
    image: sovereign-backend:latest
    container_name: sovereign_profile
    restart: always
    networks:
      - sovereign-net
    environment:
      - DATABASE_URL=postgresql://dwc_admin:insecure_dev_password@postgres:5432/gamespy
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "29900:29900"
    depends_on:
      - postgres
    volumes:
      - ./:/app
      - sovereign_logs:/app/logs

  sovereign_natneg:
    image: sovereign-backend:latest
    container_name: sovereign_natneg
    restart: always
    networks:
      - sovereign-net
    environment:
      - DATABASE_URL=postgresql://dwc_admin:insecure_dev_password@postgres:5432/gamespy
      - TRUST_ALL_PROXIES=1
    depends_on:
      - postgres
    volumes:
      - ./:/app
      - sovereign_logs:/app/logs

  sovereign_browser:
    image: sovereign-backend:latest
    container_name: sovereign_browser
    restart: always
    networks:
      - sovereign-net
    environment:
      - DATABASE_URL=postgresql://dwc_admin:insecure_dev_password@postgres:5432/gamespy
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "28910:28910"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app
      - sovereign_logs:/app/logs

  sovereign_player_search:
    image: sovereign-backend:latest
    container_name: sovereign_player_search
    restart: always
    networks:
      - sovereign-net
    environment:
      - DATABASE_URL=postgresql://dwc_admin:insecure_dev_password@postgres:5432/gamespy
    ports:
      - "29901:29901"
    depends_on:
      - postgres
    volumes:
      - ./:/app
      - sovereign_logs:/app/logs

  sovereign_gamestats:
    image: sovereign-backend:latest
    container_name: sovereign_gamestats
    restart: always
    networks:
      - sovereign-net
    environment:
      - DATABASE_URL=postgresql://dwc_admin:insecure_dev_password@postgres:5432/gamespy
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "29920:29920"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app
      - sovereign_logs:/app/logs

  sovereign_dls1:
    image: sovereign-backend:latest
    container_name: sovereign_dls1
    restart: always
    networks:
      - sovereign-net
    command: python services/dls1_server.py
    ports:
      - "9003:9003"
    volumes:
      - ./:/app
      - sovereign_logs:/app/logs

  sovereign_storage:
    image: sovereign-backend:latest
    container_name: sovereign_storage
    restart: always
    networks:
      - sovereign-net
    command: python services/storage_server.py
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - sovereign_logs:/app/logs

  sovereign_register:
    image: sovereign-backend:latest
    container_name: sovereign_register
    restart: always
    networks:
      - sovereign-net
    command: python services/register_page.py
    ports:
      - "9998:9998"
    volumes:
      - ./:/app
      - sovereign_logs:/app/logs

  sovereign_admin:
    image: sovereign-backend:latest
    container_name: sovereign_admin
    restart: always
    networks:
      - sovereign-net
    command: python services/admin_page_server.py
    ports:
      - "9009:9009"
    volumes:
      - ./:/app
      - sovereign_logs:/app/logs

  sovereign_internal_stats:
    image: sovereign-backend:latest
    container_name: sovereign_internal_stats
    restart: always
    networks:
      - sovereign-net
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "9001:9001"
    depends_on:
      - redis
    volumes:
      - ./:/app
      - sovereign_logs:/app/logs

  sovereign_stats_http:
    image: sovereign-backend:latest
    container_name: sovereign_stats_http
    restart: always
    networks:
      - sovereign-net
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "9002:9002"
    depends_on:
      - redis
    volumes:
      - ./:/app
      - sovereign_logs:/app/logs

  sovereign_proxy:
    build: ./dpi_proxy
    container_name: sovereign_proxy
    restart: always
    networks:
      - sovereign-net
    command: 27900 sovereign_qr 27900 qr 27901 sovereign_natneg 27901 natneg
    ports:
      - "27900:27900/udp"
      - "27901:27901/udp"
    depends_on:
      - sovereign_qr
      - sovereign_natneg

  sovereign_vpn:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: sovereign_vpn
    restart: always
    environment:
      - WG_HOST=YOUR_SERVER_IP_OR_DDNS
      - PASSWORD=insecure_vpn_admin_password
      - WG_DEFAULT_DNS=1.1.1.1
      - WG_ALLOWED_IPS=10.8.0.0/24,172.16.0.0/12
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    volumes:
      - wireguard_data:/etc/wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1

  sovereign_patcher:
    image: sovereign-backend:latest
    container_name: sovereign_patcher
    restart: always
    networks:
      - sovereign-net
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "9999:9999"
    depends_on:
      - redis
    volumes:
      - ./:/app
      - sovereign_logs:/app/logs

  sovereign_dashboard:
    build: ./dashboard
    container_name: sovereign_dashboard
    restart: always
    networks:
      - sovereign-net
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app
      - /app/node_modules

  sovereign_dns:
    image: sovereign-backend:latest
    container_name: sovereign_dns
    restart: always
    networks:
      - sovereign-net
    environment:
      - DWC_HOST=192.168.1.78
    ports:
      - "53:53/udp"
    volumes:
      - ./:/app
      - sovereign_logs:/app/logs

  sovereign_tcpdump:
    image: nicolaka/netshoot
    container_name: sovereign_tcpdump
    restart: always
    network_mode: "host"
    command: >
      sh -c "tcpdump -i any 'udp and (port 27900 or port 27901 or port 29900)' -l -nn -tt > /app/logs/tcpdump.log"
    volumes:
      - ./:/app
      - sovereign_logs:/app/logs

networks:
  sovereign-net:
    driver: bridge

volumes:
  postgres_data:
  wireguard_data:
  sovereign_logs:
